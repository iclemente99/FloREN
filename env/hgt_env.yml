name: hgt_env
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.8.10
  - pip
  - pip:
      # ── Deep learning ───────────────────────────────────────────────────────
      - torch==1.13.1
      - torch-geometric==2.5.3

      # ── Graph community detection (GRN Leiden analysis) ─────────────────────
      - igraph==0.11.6
      - leidenalg==0.10.2

      # ── Scientific computing ────────────────────────────────────────────────
      - numpy==1.23.1
      - scipy==1.10.1
      - pandas==2.0.3
      - scikit-learn==1.3.2
      - statsmodels==0.14.1
      - numba==0.53.1
      - numpy-groupies==0.9.22
      - dcor==0.6

      # ── Single-cell & genomics ──────────────────────────────────────────────
      - anndata==0.9.2
      - scanpy==1.9.8
      - umap-learn==0.5.6
      - conorm==1.2.0
      - loompy==3.0.7
      - tifffile==2023.7.10
      - gget==0.29.0
      - mygene==3.2.2
      - stringdb==0.1.5
      - imctools==2.1.8

      # ── Graph & network ─────────────────────────────────────────────────────
      - networkx==2.5

      # ── Visualisation ───────────────────────────────────────────────────────
      - matplotlib==3.7.5
      - seaborn==0.13.2
      - fonttools==4.51.0

      # ── Parallel processing ─────────────────────────────────────────────────
      - multiprocessing-on-dill==3.5.0a4
      - dill>=0.3.6
      - joblib==1.3.2

      # ── Jupyter / IPython ───────────────────────────────────────────────────
      - ipython==8.12.3
      - ipython-genutils==0.2.0
      - ipywidgets==8.1.5
      - jedi==0.19.2
      - jupyter-core==4.6.3
      - jupyterlab-widgets==3.0.13
      - matplotlib-inline==0.1.7

      # ── Utilities ───────────────────────────────────────────────────────────
      - tqdm==4.66.2
      - psutil==5.9.8
      - packaging==23.2
      - future==0.18.2
      - pycparser==2.20
      - PyYAML==5.3.1
      - requests==2.22.0
      - requests-oauthlib==1.3.0
      - importlib-metadata==7.1.0
      - importlib-resources==3.3.0
      - get-annotations==0.1.2
      - stack-data==0.6.3
      - threadpoolctl==3.4.0
      - stdlib-list==0.10.0
      - timer==0.3.0
      - docutils==0.15.2
      - Markdown==3.3.3

      # ── GPU monitoring (optional – comment out if unavailable) ──────────────
      - gpustat==0.6.0
      - GPUtil==1.4.0

      # ── Legacy / optional ───────────────────────────────────────────────────
      - Keras==2.4.3
      - Keras-Preprocessing==1.1.2
      - spark-nlp==2.7.2
